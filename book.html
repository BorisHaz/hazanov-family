function setLang(l, btn) {
  localStorage.setItem('hlang', l);
  document.documentElement.lang = l;
  document.documentElement.dir = l === 'he' ? 'rtl' : 'ltr';
  document.querySelectorAll('.lang-btns button').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');
  else document.getElementById('btn-' + l).classList.add('active');

  const u = UI[l];
  Object.keys(u).forEach(id => {
    const el = document.getElementById(id);
    if (el) el.innerHTML = u[id];
  });

  const chs = CHAPTERS[l];
  const nav = document.getElementById('chapters-nav');
  nav.innerHTML = chs.map(c =>
    `<a href="#ch${c.num}">${c.emoji} ${c.num}. ${c.title}</a>`
  ).join('');

  const list = document.getElementById('chapters-list');
  list.innerHTML = chs.map(c =>
    `<div class="chapter" id="ch${c.num}">
      <div class="chapter-header">
        <div class="ch-emoji">${c.emoji}</div>
        <div class="ch-meta">
          <div class="ch-num">Chapter ${c.num}</div>
          <div class="ch-title">${c.title}</div>
        </div>
      </div>
      ${c.body.split('\n\n').map(p => `<p>${p}</p>`).join('')}
    </div>`
  ).join('<div class="page-divider">✦ ✦ ✦</div>');
}

const saved = localStorage.getItem('hlang') || 'en';
setLang(saved);
