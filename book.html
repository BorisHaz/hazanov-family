<script>
const CHAPTERS = {
en:[
  {num:1,emoji:"🏠",title:"A Family by the Sea",
   body:"In the city of Mariupol, on the shore of the sparkling Azov Sea, there lived a family called Khazan. The father was Lev, a strong and clever man. The mother was Mira, kind and warm. They had five children: Viktor, the eldest, who was nearly grown up. Katya, who was sixteen. Izya, who was twelve. Borya, who was nine. And little Yan, who was only three years old.\n\nThe Khazan family had come from a Jewish farming village called Sladkovodnaya and had settled in Mariupol in the 1930s. It was their home, and they loved it."},
  {num:2,emoji:"⚔️",title:"When War Came",
   body:"In 1941, a terrible war reached their city. Soldiers marched in with guns, and they had cruel rules that said Jewish families were not safe.\n\nViktor, the eldest son, was brave. He volunteered to go and fight far away, near the city of Leningrad, to help protect his country. He left before the worst things happened — and his family was proud of him, even though they missed him very much."},
  {num:3,emoji:"📢",title:"The Gathering",
   body:"One October morning, soldiers put up notices all over the city. They said every Jewish person must come to a certain corner of the city and bring food for a few days. They promised everyone would be taken somewhere safe to work.\n\nLev, Mira, Katya, Izya, Borya, and little Yan gathered together. Thousands of other families came too — grandparents, parents, children, babies. Nobody knew yet what was really going to happen."},
  {num:4,emoji:"🚶",title:"The Road to Agrobaza",
   body:"Two days later, the soldiers made everyone walk out of the city. Mira and the two youngest boys — nine-year-old Borya and three-year-old Yan — were put onto trucks with the other mothers and small children. Lev, Katya, and Izya walked in the long column of thousands of people.\n\nThe October rain fell softly. Lev walked beside his children. Nobody spoke much. They had no idea where the trucks had taken Mira and the little boys."},
  {num:5,emoji:"😔",title:"The Terrible Place",
   body:"The column was marched to a place called Agrobaza, outside the city. There were long, wide ditches dug deep into the earth.\n\nThis part of the story is very hard and sad. The soldiers did terrible things there. They took groups of people, a hundred at a time, away from the barn where everyone waited. Katya's group was also marched out. On the road, they saw a child's little scarf lying on the ground. A small boot. A tiny hat. Everyone understood.\n\nMira, Borya, and Yan were among those killed that day. This was one of the worst things that happened in the whole war, and we remember it so we never forget."},
  {num:6,emoji:"🌙",title:"Papa Breaks the Door",
   body:"Katya's group was marched back to the barn as darkness fell. The soldiers locked the door.\n\nAt about three in the morning, when people had grown quiet, Papa Lev did something extraordinary. He was a resourceful man — the kind who finds a way. Together with another man, he began pushing and pulling at the barn door. The guard was gone. Slowly, the door gave way.\n\n\"Run,\" he said.\n\nAbout three hundred people ran out into the dark night. German guards shouted, but the people kept running, stumbling across the dark fields toward freedom."},
  {num:7,emoji:"🌾",title:"Hiding in the Haystack",
   body:"By dawn, Lev, Katya, Izya, and others had reached a large haystack in the fields. They burrowed deep inside it and held very still.\n\nGerman soldiers came. They pushed their sharp bayonets through the hay, searching. But they did not find the people hiding inside.\n\nWhen the soldiers left, Lev led them out. They walked quietly toward Mariupol, staying off the roads, moving carefully through the fields."},
  {num:8,emoji:"💔",title:"Papa's Sacrifice",
   body:"When they reached the city, Papa Lev said he could not go home — too many people in the city knew the family and might report them.\n\nHe sent twelve-year-old Izya to quietly collect some food from their apartment. Katya went to stay with a kind neighbor, a Russian woman named Ivanova, who hid her bravely.\n\nLev went east, to a village called Samoilovka, trying to reach safety. But there, a cruel policeman found him. Izya, hiding in a cornfield nearby, saw what happened. His father was killed.\n\nIzya ran. He was twelve years old, and he was alone. But he kept going."},
  {num:9,emoji:"🎭",title:"Katya's New Name",
   body:"Katya needed to become invisible. With the help of kind people along the way, she got false papers with a new name: Valentina, a Greek girl. With this new identity, she was able to move through the occupied land.\n\nBut eventually she was taken to Germany to do forced labor — very hard work in terrible conditions. She worked at a brick factory from sunrise to sunset. It was frightening and exhausting. Yet even there, she found ordinary people who were kind to her in small ways, and those small kindnesses helped her survive."},
  {num:10,emoji:"⚡",title:"Viktor's Incredible Story",
   body:"While all this was happening, Viktor — the eldest brother, far away — was having his own extraordinary adventure.\n\nHe was captured by the enemy in 1942, wounded. He was taken to a very cruel camp called Buchenwald. It seemed like the end. But Viktor was brave and clever like his father.\n\nInside the camp, he met secret friends who were secretly organizing. They formed an underground group — a hidden team fighting back from inside the camp. Viktor became one of its leaders.\n\nOn April 11, 1945, something remarkable happened: the prisoners rose up and fought back. Viktor helped lead the attack on the guard towers. By evening, twenty thousand prisoners had freed themselves. Viktor survived."},
  {num:11,emoji:"🤝",title:"Finding Each Other Again",
   body:"After the war ended, Katya made her long way home.\n\nShe heard that Izya might be in a small village called Verkhniye Adzhakhi. She went there.\n\nA teenager was working in a yard. He looked up. He saw her. He ran inside shouting: \"Vitya! Our Katya is alive!\"\n\nIt was Izya.\n\nThey held each other and cried. They had both survived the unsurvivable. Their brother Viktor came home too, though he had to face more difficulties before he was truly free. The three of them were together again."},
  {num:12,emoji:"🌟",title:"What They Left Behind",
   body:"Viktor worked for the rest of his life in Mariupol, at the big Azovstal steel factory. He died in 1987 at the age of 65. Izya moved to the city of Tbilisi, and later went to Israel. Katya told her story to a writer named Lev Yarutsky, who wrote it all down so it would never be forgotten.\n\nThree members of the family did not come home: Mira, Borya, and Yan. Mira was 41. Borya was 9. Yan was 3.\n\nThis story is for you, whoever is reading it. So you know that even in the darkest times, people showed courage, helped strangers, and looked after each other. And so you say these names out loud:\n\nMira. Borya. Yan.\n\n✦ Remember them. ✦"}
],
ru:[
  {num:1,emoji:"🏠",title:"Семья у моря",
   body:"В городе Мариуполе, на берегу сверкающего Азовского моря, жила семья Хазан. Отца звали Лев — сильный и смекалистый человек. Мать звали Мира — добрая и тёплая. У них было пятеро детей: Виктор, почти уже взрослый; Катя, ей было шестнадцать; Изя, двенадцатилетний; Боря, девятилетний; и маленький Ян — ему исполнилось всего три года.\n\nСемья Хазан приехала из еврейской земледельческой колонии Сладководная и обосновалась в Мариуполе в 1930-х годах. Это был их дом, и они его любили."},
  {num:2,emoji:"⚔️",title:"Когда пришла война",
   body:"В 1941 году страшная война добралась до их города. Солдаты вошли с оружием и объявили жестокие правила — еврейские семьи больше не в безопасности.\n\nВиктор, старший сын, был смелым. Он добровольно пошёл на фронт — воевать далеко, под Ленинградом. Он уехал ещё до того, как случилось самое страшное. Семья им гордилась, хотя очень скучала по нему."},
  {num:3,emoji:"📢",title:"Сбор",
   body:"Одним октябрьским утром солдаты развесили по городу объявления: все евреи должны явиться на определённый угол улицы и взять еду на несколько дней. Всем обещали, что отвезут в безопасное место для работы.\n\nЛев, Мира, Катя, Изя, Боря и маленький Ян собрались вместе. Пришли тысячи семей — дедушки и бабушки, мамы и папы, дети, младенцы. Никто ещё не знал, что будет дальше."},
  {num:4,emoji:"🚶",title:"Дорога на Агробазу",
   body:"Через два дня солдаты погнали всех из города. Миру с двумя младшими мальчиками — девятилетним Борей и трёхлетним Яном — вместе с другими матерями и малышами погрузили в машины и увезли. Лев, Катя и Изя шли в длинной колонне тысяч людей.\n\nМелкий октябрьский дождь сеял с неба. Лев шёл рядом с детьми. Почти никто не разговаривал. Никто не знал, куда увезли Миру с малышами."},
  {num:5,emoji:"😔",title:"Страшное место",
   body:"Колонну привели на Агробазу, за город. Там были вырыты длинные глубокие рвы.\n\nЭта часть истории очень тяжёлая и грустная. Солдаты делали там страшные вещи. Из сарая, где ждали люди, уводили группами по сто человек. Группу Кати тоже вывели. На дороге лежали детский шарфик, маленький ботиночек, шапочка. Всем стало понятно.\n\nМира, Боря и Ян были среди убитых в тот день. Это было одно из самых страшных событий всей войны. Мы помним о нём, чтобы никогда не забыть."},
  {num:6,emoji:"🌙",title:"Папа выламывает дверь",
   body:"С наступлением темноты группу Кати погнали обратно в сарай. Солдаты закрыли дверь.\n\nОколо трёх часов ночи, когда люди немного притихли, папа Лев совершил удивительный поступок. Он был человек смелый и сметливый — из тех, кто всегда найдёт выход. Вместе с ещё одним мужчиной он начал нажимать и тянуть дверь сарая. Часового не было. Дверь поддалась.\n\n«Бегите», — сказал он.\n\nОколо трёхсот человек выбежали в ночную темноту. Немецкие охранники кричали, но люди бежали — спотыкаясь в темноте, через поля, к свободе."},
  {num:7,emoji:"🌾",title:"Укрытие в скирде",
   body:"На рассвете Лев, Катя, Изя и другие добрались до большой скирды на полях и зарылись внутрь — глубоко, и замерли.\n\nПришли немецкие солдаты. Они стали протыкать сено штыками — искали беглецов. Но людей, спрятавшихся внутри, не нашли.\n\nКогда солдаты ушли, Лев вывел их наружу. Они тихо двинулись к Мариуполю — стороной от дорог, осторожно, по полям."},
  {num:8,emoji:"💔",title:"Жертва папы",
   body:"Добравшись до города, папа Лев сказал, что сам идти домой не может — слишком многие знают семью в лицо, могут донести.\n\nОн отправил двенадцатилетнего Изю тихонько забрать из квартиры сухари. Катя пошла к доброй соседке — русской женщине Ивановой, которая мужественно её укрыла.\n\nЛев направился на восток, в село Самойловку, пытаясь добраться до безопасного места. Но там его нашёл жестокий полицай. Изя, прятавшийся в кукурузном поле неподалёку, видел, что произошло. Его отца убили.\n\nИзя побежал. Ему было двенадцать лет, и он был один. Но он продолжал идти."},
  {num:9,emoji:"🎭",title:"Новое имя Кати",
   body:"Кате нужно было стать невидимкой. С помощью добрых людей на её пути она получила фальшивые документы на новое имя: Валентина, гречанка. С этой новой личностью она могла передвигаться по оккупированной земле.\n\nНо в конце концов её угнали в Германию на принудительные работы — тяжёлый труд в ужасных условиях. Кирпичный завод, от рассвета до заката. Было страшно и изматывающе. Но даже там она встречала простых людей, которые по-человечески к ней относились, и эти маленькие добрые поступки помогали выжить."},
  {num:10,emoji:"⚡",title:"Удивительная история Виктора",
   body:"Пока всё это происходило, Виктор — старший брат, далеко — переживал собственное невероятное приключение.\n\nВ 1942 году, раненым, он попал в плен. Его привезли в очень жестокий лагерь под названием Бухенвальд. Казалось — это конец. Но Виктор был смелым и сметливым, как его отец.\n\nВ лагере он встретил тайных друзей, которые тайно объединялись. Они создали подпольную группу — скрытую команду, которая боролась изнутри. Виктор стал одним из её руководителей.\n\n11 апреля 1945 года произошло нечто удивительное: заключённые восстали и дали отпор. Виктор помогал вести атаку на сторожевые башни. К вечеру двадцать тысяч заключённых освободили себя сами. Виктор выжил."},
  {num:11,emoji:"🤝",title:"Снова вместе",
   body:"Когда война закончилась, Катя долго добиралась домой.\n\nОна узнала, что Изя, возможно, в маленьком селе Верхние Аджахи. Она поехала туда.\n\nВо дворе возился подросток. Он поднял голову. Увидел её. Кинулся в дом с криком: «Витя! Наша Катя жива!»\n\nЭто был Изя.\n\nОни обнялись и заплакали. Оба выжили там, где, казалось, выжить невозможно. Брат Виктор тоже вернулся домой — хотя ему пришлось преодолеть ещё немало трудностей. Все трое снова были вместе."},
  {num:12,emoji:"🌟",title:"Что они оставили после себя",
   body:"Виктор до конца жизни работал в Мариуполе, на большом сталелитейном заводе «Азовсталь». Умер в 1987 году в возрасте 65 лет. Изя переехал в Тбилиси, а позже уехал в Израиль. Катя рассказала свою историю писателю Льву Яруцкому, который записал всё слово в слово, чтобы оно не было забыто.\n\nТрое из семьи не вернулись домой: Мира, Боря и Ян. Мире было 47 лет. Боре — 9. Яну — 3.\n\nЭта книга — для тебя, кто её читает. Чтобы ты знал: даже в самые тёмные времена люди проявляли смелость, помогали незнакомцам и берегли друг друга. И чтобы ты произнёс эти имена вслух:\n\nМира. Боря. Ян.\n\n✦ Помни их. ✦"}
],
he:[
  {num:1,emoji:"🏠",title:"משפחה על שפת הים",
   body:"בעיר מריופול, על חוף ים אזוב הנוצץ, חיה משפחה בשם חזן. האב שמו לב — איש חזק ותושייתי. האם שמה מירה — טובת לב וחמה. היו להם חמישה ילדים: ויקטור, הבכור, כמעט מבוגר; קטיה, בת שש עשרה; איזיה, בן שתים עשרה; בוריה, בן תשע; ויאן הקטן — בן שלוש בלבד.\n\nמשפחת חזן הגיעה מכפר חקלאי יהודי בשם סלדקובודנאיה, והתיישבה במריופול בשנות השלושים. זה היה ביתם, והם אהבו אותו."},
  {num:2,emoji:"⚔️",title:"כשהמלחמה הגיעה",

function setLang(l,btn){
  localStorage.setItem('hlang',l);
  document.documentElement.lang=l;
  document.documentElement.dir=l==='he'?'rtl':'ltr';
  document.querySelectorAll('.lang-btns button').forEach(b=>b.classList.remove('active'));
  if(btn)btn.classList.add('active');
  else document.getElementById('btn-'+l).classList.add('active');
  const u=UI[l];
  Object.keys(u).forEach(id=>{const el=document.getElementById(id);if(el)el.innerHTML=u[id];});
  const chs=CHAPTERS[l];
  document.getElementById('chapters-nav').innerHTML=chs.map(c=>`<a href="#ch${c.num}">${c.emoji} ${c.num}. ${c.title}</a>`).join('');
  document.getElementById('chapters-list').innerHTML=chs.map(c=>
    `<div class="chapter" id="ch${c.num}">
      <div class="chapter-header">
        <div class="ch-emoji">${c.emoji}</div>
        <div>
          <div class="ch-num">Chapter ${c.num}</div>
          <div class="ch-title">${c.title}</div>
        </div>
      </div>
      ${c.body.split('\n\n').map(p=>`<p>${p}</p>`).join('')}
    </div>`
  ).join('<div class="page-divider">✦ ✦ ✦</div>');
}
setLang(localStorage.getItem('hlang')||'en');
